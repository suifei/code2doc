<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" role="img" aria-label="code2doc skill — SDLC document coverage map">
<title>code2doc — SDLC Document Coverage Map</title>

<style>
  @media (prefers-color-scheme: dark) {
    .bg   { fill: #1a1a1a; }
    .card { fill: #242424; stroke: #333; }
    .txt  { fill: #e0ddd4; }
    .muted{ fill: #888780; }
    .div  { stroke: #333; }
    .leg-bg { fill: #242424; stroke: #444; }
  }
  @media (prefers-color-scheme: light) {
    .bg   { fill: #fafaf8; }
    .card { fill: #ffffff; stroke: #e0ddd4; }
    .txt  { fill: #1a1a18; }
    .muted{ fill: #888780; }
    .div  { stroke: #e8e6de; }
    .leg-bg { fill: #ffffff; stroke: #e0ddd4; }
  }
  text { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
  .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; }
  .phase { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
  .title { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 600; }
  .sub   { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; }

  /* covered */
  .c-green { fill: #e9f5de; stroke: #639922; }
  .c-green text { fill: #27500a; }
  @media (prefers-color-scheme: dark) {
    .c-green { fill: #1d3810; stroke: #639922; }
    .c-green text { fill: #97c459; }
  }

  /* partial */
  .c-amber { fill: #faeeda; stroke: #ba7517; }
  .c-amber text { fill: #633806; }
  @media (prefers-color-scheme: dark) {
    .c-amber { fill: #3a2800; stroke: #ba7517; }
    .c-amber text { fill: #fac775; }
  }

  /* missing */
  .c-red { fill: #fceaea; stroke: #e24b4a; }
  .c-red text { fill: #791f1f; }
  @media (prefers-color-scheme: dark) {
    .c-red { fill: #2e1010; stroke: #e24b4a; }
    .c-red text { fill: #f09595; }
  }

  /* frontier */
  .c-purple { fill: #eeedfe; stroke: #7f77dd; }
  .c-purple text { fill: #3c3489; }
  @media (prefers-color-scheme: dark) {
    .c-purple { fill: #1c1a38; stroke: #7f77dd; }
    .c-purple text { fill: #afa9ec; }
  }

  .phase-col { fill: #f1efe8; }
  @media (prefers-color-scheme: dark) { .phase-col { fill: #242424; } }
</style>

<!-- Background -->
